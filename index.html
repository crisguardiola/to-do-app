<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app">
      <header class="app-topbar" role="banner">
        <div id="auth-bar" class="auth-bar auth-bar--minimal" aria-live="polite">
          <button type="button" id="auth-account-btn" class="btn btn-secondary auth-link" hidden>Sign in</button>
        </div>
      </header>
      <div class="app-split">
        <aside id="chat-panel" class="chat-panel" aria-label="AI assistant">
          <div class="chat-panel-inner">
            <header class="chat-header">
              <div class="chat-header-text">
                <p class="chat-subtitle">Hello, what's keeping you busy lately?</p>
              </div>
            </header>
            <div id="chat-messages" class="chat-messages" role="log" aria-live="polite"></div>
            <div class="chat-prompts" aria-label="Example prompts">
              <button type="button" class="chat-prompt-card" data-prompt="I need to prepare a benchmarking presentation">I need to prepare a benchmarking presentation</button>
              <button type="button" class="chat-prompt-card" data-prompt="I have to onboard a new employee next week">I have to onboard a new employee next week</button>
              <button type="button" class="chat-prompt-card" data-prompt="I want to plan a surprise birthday party for a friend">I want to plan a surprise birthday party for a friend</button>
            </div>
            <form id="chat-form" class="chat-form" aria-label="Send message">
              <div class="chat-input-wrap">
                <textarea id="chat-input" class="todo-input chat-input" placeholder="Describe a goal or task..." aria-label="Your message" rows="1"></textarea>
                <button type="submit" id="chat-send-btn" class="btn chat-send-btn" aria-label="Send message">Send</button>
              </div>
            </form>
          </div>
        </aside>
        <div class="app-divider" aria-hidden="true"></div>
        <div class="todo-app">
          <div id="auth-modal" class="auth-modal" hidden role="dialog" aria-modal="true" aria-labelledby="auth-modal-title">
            <div class="auth-modal-content">
              <h2 id="auth-modal-title" class="auth-modal-title"></h2>
              <form id="auth-form" class="auth-form">
                <input type="email" id="auth-email" class="todo-input" placeholder="Email" autocomplete="email" required />
                <input type="password" id="auth-password" class="todo-input" placeholder="Password" autocomplete="current-password" minlength="6" />
                <p id="auth-form-error" class="todo-error" hidden aria-live="polite"></p>
                <div class="auth-form-actions">
                  <button type="submit" id="auth-submit" class="btn todo-add">Submit</button>
                  <button type="button" id="auth-cancel" class="btn btn-text">Cancel</button>
                </div>
              </form>
              <p id="auth-modal-switch" class="auth-modal-switch" hidden>Already have an account? <button type="button" id="auth-switch-to-signin" class="btn btn-text">Sign in</button></p>
              <p id="auth-modal-switch-signin" class="auth-modal-switch" hidden>No account? <button type="button" id="auth-switch-to-create" class="btn btn-text">Sign up</button></p>
            </div>
          </div>
          <div class="todo-app__scroll">
          <p id="todo-error" class="todo-error" hidden aria-live="polite"></p>
          <div id="todo-empty-state" class="todo-empty-state" hidden>
            <p class="todo-empty-state__title">Nudge</p>
            <p class="todo-empty-state__tagline">From idea to action, instantly</p>
            <p class="todo-empty-state__subtitle">Add tasks manually or let AI plan it for you</p>
          </div>
          <form id="todo-form" class="todo-form" aria-label="Add todo">
            <div class="todo-input-wrap">
              <div class="todo-priority-tag-wrap">
                <button type="button" class="todo-priority-tag todo-priority-tag--undefined" id="todo-priority-tag" aria-label="Priority" aria-haspopup="listbox" aria-expanded="false" title="Priority">Priority</button>
                <div class="todo-priority-dropdown" id="todo-priority-dropdown" role="listbox" aria-label="Choose priority" hidden>
                  <button type="button" role="option" class="todo-priority-tag-option todo-priority-tag-option--low" data-value="low">Low</button>
                  <button type="button" role="option" class="todo-priority-tag-option todo-priority-tag-option--medium" data-value="medium">Medium</button>
                  <button type="button" role="option" class="todo-priority-tag-option todo-priority-tag-option--high" data-value="high">High</button>
                </div>
              </div>
              <input type="text" id="todo-input" class="todo-input" placeholder="What do you need to do?" autocomplete="off" aria-label="Todo description" />
            </div>
            <input type="hidden" id="todo-priority" name="priority" value="undefined" />
            <button type="submit" class="btn todo-add">Add</button>
          </form>
          <header class="todo-header" role="row">
            <div class="todo-header__cell todo-header__cell--checkbox">
              <input type="checkbox" id="todo-select-all" class="todo-header__select-all" aria-label="Select or deselect all todos" />
            </div>
            <div class="todo-header__cell todo-header__cell--list">
              <button type="button" class="todo-header__sort-btn" id="todo-sort-list" aria-label="Sort by list name">
                <span class="todo-header__label">Your list</span>
                <span class="todo-header__arrow" id="todo-sort-list-arrow" aria-hidden="true">↕</span>
              </button>
            </div>
            <div class="todo-header__cell todo-header__cell--priority">
              <button type="button" class="todo-header__sort-btn" id="todo-sort-priority" aria-label="Sort by priority">
                <span class="todo-header__label">Priority</span>
                <span class="todo-header__arrow" id="todo-sort-priority-arrow" aria-hidden="true">↕</span>
              </button>
            </div>
            <div class="todo-header__cell todo-header__cell--spacer" aria-hidden="true"></div>
          </header>
          <ul id="todo-list" class="todo-list" aria-label="Todo items"></ul>
          </div>
          <div id="auth-guest-cta" class="auth-guest-cta" hidden>
            <button type="button" id="auth-guest-cta-btn" class="btn auth-guest-cta__btn" aria-label="Sign in to save your list">Using app as guest</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
